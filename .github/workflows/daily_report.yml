name: AI YouTube Trend Report

on:
  schedule:
    - cron: "0 13 1,15 * *"   # 6am PT (UTC-7 PDT) on the 1st and 15th of each month
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from GitHub Secrets
        run: |
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "GMAIL_ADDRESS=${{ secrets.GMAIL_ADDRESS }}" >> .env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env
          echo "RECIPIENT_EMAIL=${{ secrets.RECIPIENT_EMAIL }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env

      - name: Fetch YouTube trends
        run: python tools/fetch_youtube_trends.py

      - name: Analyze trends
        run: python tools/analyze_trends.py

      - name: Generate AI news summary
        run: python tools/generate_news_summary.py

      - name: Generate charts
        run: python tools/generate_charts.py

      - name: Create slide deck
        run: python tools/create_deck.py

      - name: Send email report
        run: python tools/send_email.py
